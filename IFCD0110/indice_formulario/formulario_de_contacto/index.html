    <div>
        <form action="#" name="formulario de contacto" method="post">
            <legend>
                <h1>Formulario de contacto</h1>
            </legend>

            <label for="name">Nombre<span>*</span></label>
            <input type="text" id="name" name="Nombre" required pattern="[A-Z][A-Za-z\- ]+" placeholder="Nombre"
                title="No acepta acentos">

            <label for="apellido">Apellido<span>*</span></label>
            <input type="text" id="apellido" name="apellido" required pattern="[A-Z][A-Za-z\- ]+" placeholder="Apellido"
                title="No acepta acentos">

            <label for="telefono">Teléfono<span>*</span></label>
            <input type="tel" id="telefono" name="telefono" required pattern="[\+][0-9]{1,3}[ ][0-9]{9,12}"
                placeholder="+CPais 000000000">

            <label for="email">Correo electrónico<span>*</span></label>
            <input type="email" id="email" name="email" required placeholder="E-mail">

            <label for="consulta">Consulta<span>*</span></label>
            <textarea id="consulta" name="consulta" required
                placeholder="Escribe aquí tu consulta..."></textarea><br><br>

            <label for="aceptar"></label>
            <input type="checkbox" id="aceptar" name="confirma" required> Acepto los términos y <a href="#">condiciones
                de privacidad</a><br><br>

            <input type="submit" id="enviar" name="boton_enviar">
        </form>
