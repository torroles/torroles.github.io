    <h1>Formulario de acceso</h1>
<hr>
    <div class="linea">
        <div class="encabezado">
            <img src="../img/img_avatar.png" alt="avatar" id="redondo">
            <div class="cruz">&times;</div>
        </div>

        <form action="#" method="post" name="formulario de registro" id="registro">
            <div class="formulario">

                <label for="usuario">Usuario</label>
                <input type="text" id="usuario" name="usuario" required pattern="[A-Za-zñÑ0-9]+"
                    placeholder="Tu nombre de usuario" title="Solo letras y números">

                <label for="contraseña">Contraseña</label>
                <input type="password" id="contraseña" name="contraseña" required pattern="[A-Z][0-9]+" maxlength="12"
                    placeholder="Contraseña" title="Primera mayúscula, después números">

                <label for="submit">&nbsp;</label>
                <input type="submit" id="submit" name="iniciar_sesion" value="Iniciar sesión"><br>

                <label for="checkbox">&nbsp;</label>
                <input type="checkbox" id="checkbox" name="Recordarme" checked>Recordarme
            </div>

            <div class="pie">
                <input type="submit" name="Registrarse" value="Registrarse" form="registro">
                <p>¿Has olvidado la <a href="#">contraseña</a>?</p>
            </div>
        </form>
    </div>
