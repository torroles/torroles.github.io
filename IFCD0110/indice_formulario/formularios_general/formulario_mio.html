        <div class="titulo">
            <h2>TÍTULO DEL FORMULARIO</h2>
            <p>DESCRIPCIÓN DEL FORMULARIO</p>
        </div>
   

    <main>
        <div class="contenedor">
            <!-- Columna Izquierda -->
            <div class="contenido" id="fondo">
                <form action="#">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" placeholder="tu_nombre" required>

                    <label for="apellido">Apellido</label>
                    <input type="text" id="apellido" placeholder="tu_apellido" required>

                    <label for="dni">DNI</label>
                    <input type="text" name="dni" id="dni" required placeholder="00000000-X" pattern="[0-9]{8}-[A-Z]">

                    <div class="grupo-radio">
                        <div class="opcion-sexo">
                            <label for="masculino">Hombre</label>
                            <input type="radio" id="masculino" name="sexo">
                        </div>
                    </div>
                </form>
            </div>

            <!-- Columna Derecha -->
            <div class="contenido" id="fondo1">
                <form action="#">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="tu e-mail" required>

                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="contraseña" required>

                    <label for="movil">Teléfono</label>
                    <input type="tel" id="movil" placeholder="123456789" pattern="[0-9]{9}" required>

                    <div class="grupo-radio">
                        <div class="opcion-sexo">
                            <label for="femenino">Mujer</label>
                            <input type="radio" id="femenino" name="sexo">
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </main>
